<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#070B14">
  <title>Navo Next</title>
  <link rel="icon" href="assets/navo-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="bg"></div>
  <div id="toast" class="toast"></div>

  <section id="authView" class="auth-view">
    <div class="auth-shell">
      <div class="auth-brand glass">
        <img src="assets/navo-mark.svg" alt="Navo">
        <span>Calm Intelligence OS</span>
        <h1>رتّب يومك بهدوء.</h1>
        <p>مهامك، تركيزك، مساحاتك وإعداداتك في تجربة بسيطة وفخمة وسريعة.</p>
      </div>

      <form id="authForm" class="auth-card glass">
        <img class="auth-logo" src="assets/navo-mark.svg" alt="Navo">
        <p class="chip" id="authChip">WELCOME BACK</p>
        <h2 id="authTitle">تسجيل الدخول</h2>
        <p class="muted" id="authDesc">ادخل باسم المستخدم وكلمة المرور.</p>

        <div class="tabs">
          <button id="loginTab" class="active" type="button">دخول</button>
          <button id="registerTab" type="button">إنشاء حساب</button>
        </div>

        <label>اسم المستخدم
          <input id="username" autocomplete="username" placeholder="مثال: zayed" minlength="3" required>
        </label>

        <label>كلمة المرور
          <input id="password" autocomplete="current-password" type="password" placeholder="6 أحرف أو أكثر" minlength="6" required>
        </label>

        <p id="authMsg" class="msg"></p>

        <button id="authSubmit" class="btn primary full" type="submit">دخول</button>
        <button id="demoBtn" class="btn ghost full" type="button">تجربة سريعة</button>
      </form>
    </div>
  </section>

  <main id="appView" class="app hidden">
    <aside id="sidebar" class="sidebar glass">
      <div class="side-brand">
        <img src="assets/navo-mark.svg" alt="Navo">
        <div>
          <b>Navo</b>
          <small>Next Workspace</small>
        </div>
      </div>

      <nav>
        <button class="nav active" data-page="home">⌘ <span>الرئيسية</span></button>
        <button class="nav" data-page="tasks">✓ <span>المهام</span></button>
        <button class="nav" data-page="focus">◉ <span>التركيز</span></button>
        <button class="nav" data-page="spaces">▦ <span>المساحات</span></button>
        <button class="nav" data-page="settings">⚙ <span>الإعدادات</span></button>
      </nav>

      <div class="side-user">
        <div id="avatar" class="avatar">N</div>
        <div>
          <b id="sideName">Navo User</b>
          <small>Local Data</small>
        </div>
      </div>

      <button id="logoutBtn" class="btn ghost full">تسجيل خروج</button>
    </aside>

    <section class="workspace">
      <header class="topbar glass">
        <button id="menuBtn" class="icon mobile">☰</button>
        <div>
          <small id="todayText">اليوم</small>
          <h1 id="pageTitle">الرئيسية</h1>
        </div>
        <div class="top-actions">
          <button id="themeBtn" class="btn ghost small">🌙</button>
          <button id="newTaskTop" class="btn primary small">+ مهمة</button>
        </div>
      </header>

      <section id="home" class="page active"></section>
      <section id="tasks" class="page"></section>
      <section id="focus" class="page"></section>
      <section id="spaces" class="page"></section>
      <section id="settings" class="page"></section>
    </section>

    <nav class="bottom-nav glass">
      <button class="mnav active" data-page="home">⌘<span>الرئيسية</span></button>
      <button class="mnav" data-page="tasks">✓<span>المهام</span></button>
      <button class="mnav" data-page="focus">◉<span>تركيز</span></button>
      <button class="mnav" data-page="spaces">▦<span>مساحات</span></button>
      <button class="mnav" data-page="settings">⚙<span>إعدادات</span></button>
    </nav>
  </main>

  <div id="overlay" class="overlay"></div>

  <dialog id="taskDialog">
    <form id="taskForm" class="modal glass" method="dialog">
      <button id="closeTask" class="icon close" type="button">×</button>
      <h2 id="taskModalTitle">مهمة جديدة</h2>
      <input id="taskId" type="hidden">
      <label>عنوان المهمة<input id="taskTitle" required placeholder="وش بتنجز؟"></label>
      <label>الأولوية
        <select id="taskPriority">
          <option value="high">عالية</option>
          <option value="medium" selected>متوسطة</option>
          <option value="low">خفيفة</option>
        </select>
      </label>
      <label>المساحة<select id="taskSpace"></select></label>
      <button class="btn primary full">حفظ</button>
    </form>
  </dialog>

  <dialog id="spaceDialog">
    <form id="spaceForm" class="modal glass" method="dialog">
      <button id="closeSpace" class="icon close" type="button">×</button>
      <h2>مساحة جديدة</h2>
      <label>اسم المساحة<input id="spaceName" required placeholder="جامعة، برمجة، شخصي..."></label>
      <label>اللون<input id="spaceColor" type="color" value="#5BE7FF"></label>
      <button class="btn primary full">إضافة</button>
    </form>
  </dialog>

  <script src="config/navo-config.js"></script>
  <script src="app/main.js"></script>
</body>
</html>
